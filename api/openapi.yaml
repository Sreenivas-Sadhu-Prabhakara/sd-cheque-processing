# API contract — owned by THIS repo (contract-per-repo). Phase 2a: real domain.
openapi: 3.0.3
info:
  title: "Cheque Processing — BIAN Semantic API"
  description: >
    BIAN Service Domain 'Cheque Processing' (Process) on the 'Cheque
    Transaction Procedure' control record — the check-clearance lifecycle:
    LODGED → PRESENTED → CLEARED | RETURNED, with STOPPED honored only before
    presentment. Cleared cheques emit the beneficiary credit instruction
    consumed by the account service domains.
  version: 0.2.0
servers:
  - url: /
  - url: /sd-cheque-processing
    description: through the platform gateway

paths:
  /v1/service-domain:
    get:
      operationId: getServiceDomain
      summary: Service domain metadata
      responses:
        "200": { description: SD identity and BIAN classification }

  /v1/cheque-transaction-procedure/initiate:
    post:
      operationId: lodgeCheque
      summary: "Initiate — lodge a cheque for clearing"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chequeNumber, drawerAccountRef, beneficiaryAccountRef, amountMinor]
              properties:
                chequeNumber: { type: string, pattern: "^\\d{6,}$" }
                drawerAccountRef: { type: string, description: "account the cheque is drawn on" }
                beneficiaryAccountRef: { type: string, description: "account to credit on clearance (≠ drawer)" }
                amountMinor: { type: integer, format: int64, minimum: 1 }
                currency: { type: string, pattern: "^[A-Z]{3}$", default: INR }
      responses:
        "201":
          description: Cheque lodged (status LODGED)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cheque" }
        "400": { $ref: "#/components/responses/Invalid" }

  /v1/cheque-transaction-procedure:
    get:
      operationId: listCheques
      summary: Retrieve (collection)
      responses:
        "200":
          description: All cheques
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Cheque" }

  /v1/cheque-transaction-procedure/{chequeId}/retrieve:
    get:
      operationId: retrieveCheque
      summary: Retrieve
      parameters: [{ $ref: "#/components/parameters/ChequeId" }]
      responses:
        "200":
          description: The cheque
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Cheque" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/cheque-transaction-procedure/{chequeId}/control:
    put:
      operationId: stopCheque
      summary: "Control — stop order (honored only BEFORE presentment)"
      parameters: [{ $ref: "#/components/parameters/ChequeId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [stop] }
      responses:
        "200": { description: Cheque STOPPED }
        "400": { $ref: "#/components/responses/Invalid" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RuleViolation" }

  /v1/cheque-transaction-procedure/{chequeId}/present:
    post:
      operationId: presentCheque
      summary: "Execute — present to the clearing house (LODGED → PRESENTED)"
      parameters: [{ $ref: "#/components/parameters/ChequeId" }]
      responses:
        "200": { description: Cheque PRESENTED }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RuleViolation" }

  /v1/cheque-transaction-procedure/{chequeId}/clear:
    post:
      operationId: clearCheque
      summary: "Execute — honored by clearing (PRESENTED → CLEARED); emits beneficiary credit"
      parameters: [{ $ref: "#/components/parameters/ChequeId" }]
      responses:
        "200": { description: Cheque CLEARED }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RuleViolation" }

  /v1/cheque-transaction-procedure/{chequeId}/return:
    post:
      operationId: returnCheque
      summary: "Execute — bounced by clearing (PRESENTED → RETURNED); reason mandatory"
      parameters: [{ $ref: "#/components/parameters/ChequeId" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, example: insufficient-funds }
      responses:
        "200": { description: Cheque RETURNED }
        "400": { $ref: "#/components/responses/Invalid" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/RuleViolation" }

components:
  parameters:
    ChequeId:
      name: chequeId
      in: path
      required: true
      schema: { type: string }

  responses:
    NotFound:
      description: Unknown cheque
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    RuleViolation:
      description: Illegal state transition (e.g. clear before present, stop after present)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Invalid:
      description: Bad input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Cheque:
      type: object
      properties:
        chequeId: { type: string, example: "CHQ-…" }
        chequeNumber: { type: string }
        drawerAccountRef: { type: string }
        beneficiaryAccountRef: { type: string }
        amountMinor: { type: integer, format: int64 }
        currency: { type: string, example: INR }
        status:
          type: string
          enum: [LODGED, PRESENTED, CLEARED, RETURNED, STOPPED]
        returnReason: { type: string, nullable: true }
        lodgedAt: { type: string, format: date-time }
        presentedAt: { type: string, format: date-time, nullable: true }
        settledAt: { type: string, format: date-time, nullable: true }

    Error:
      type: object
      properties:
        code: { type: string, example: ILLEGAL_TRANSITION }
        message: { type: string }
