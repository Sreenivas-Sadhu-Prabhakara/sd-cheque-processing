spring:
  application:
    name: sd-cheque-processing

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Cheque Processing"
    businessArea: "Operations and Execution"
    businessDomain: "Payments"
    functionalPattern: "Process"
    assetType: "Cheque Transaction"
    controlRecord: "Cheque Transaction Procedure"
    phase: "2a-deep"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Profile 'kafka': real event transport (gate 2). Without it, events log.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${BIAN_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
